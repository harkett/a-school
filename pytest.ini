[pytest]
# Suite de tests aSchool — convention unique : fichiers test_*.py, fonctions test_*, assert simples.
# Lancer toute la suite :  .\.venv\Scripts\python.exe -m pytest
# (le diagnostic SMTP est dans smtp_check.py — hors namespace test_, non collecté)
addopts = -q
norecursedirs = .venv venv node_modules frontend data .git dist build
