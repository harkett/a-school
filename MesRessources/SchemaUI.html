<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Interface IA – Version PRO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: #1f6feb;
      color: #fff;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo {
      font-weight: 700;
    }
    .slogan {
      font-weight: 500;
      opacity: 0.9;
    }
    .btn-connexion {
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      border: none;
      background: #fff;
      color: #1f6feb;
      font-weight: 600;
      cursor: pointer;
    }

    /* TITRE + ACTION */
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }
    .title-bar h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .btn-generate-top {
      padding: 0.45rem 1.1rem;
      border-radius: 4px;
      border: none;
      background: #1f6feb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    /* LAYOUT PRINCIPAL */
    .layout {
      display: flex;
      min-height: calc(100vh - 64px - 64px - 40px); /* header + title + footer approx */
    }

    /* SIDEBAR (pleine hauteur, largeur minimale, rétractable conceptuellement) */
    .sidebar {
      width: 180px; /* largeur
