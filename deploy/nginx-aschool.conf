server {
    listen 80;
    server_name aschool.fr www.aschool.fr;
    return 301 https://aschool.fr$request_uri;
}

# www.aschool.fr → renvoie vers le nom canonique aschool.fr
server {
    listen 443 ssl;
    server_name www.aschool.fr;

    ssl_certificate     /etc/letsencrypt/live/aschool.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aschool.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://aschool.fr$request_uri;
}

server {
    listen 443 ssl;
    server_name aschool.fr;

    ssl_certificate     /etc/letsencrypt/live/aschool.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aschool.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/a-school/frontend/dist;
    index index.html;

    # API → FastAPI/uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming SSE de /api/generate : sans ça, nginx TAMPONNE la réponse et la relâche d'un
        # bloc → le « fil de l'eau » n'atteint jamais le navigateur (le bug qu'on corrige). On coupe
        # le tampon et on laisse un flux qui progresse tenir longtemps (la coupure de SILENCE est,
        # elle, gérée côté application via le réglage admin en base). HTTP/1.1 = pas de bufferisation
        # implicite liée à HTTP/1.0.
        proxy_buffering     off;
        proxy_http_version  1.1;
        proxy_read_timeout  3600s;
    }

    # React SPA — toujours renvoyer index.html pour le routing client
    location / {
        try_files $uri $uri/ /index.html;
    }
}
