server {
    listen 80;
    server_name school.afia.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name school.afia.fr;

    ssl_certificate     /etc/letsencrypt/live/school.afia.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/school.afia.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/a-school/frontend/dist;
    index index.html;

    # API → FastAPI/uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React SPA — toujours renvoyer index.html pour le routing client
    location / {
        try_files $uri $uri/ /index.html;
    }
}
